---
# tasks file for web
- name: Install Apache
  dnf:
   name: httpd
   state: present

- name: Start and Enable Apache
  service:
   name: httpd
   state: started
   enabled: yes

- name: Allow HTTP in firewall
  firewalld:
   service: http
   permanent: true
   state: enabled
   immediate: yes

- name: Deploy web page
  template:
   src: index.html.j2
   dest: /var/www/html/index.html
