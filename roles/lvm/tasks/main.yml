---
# tasks file for lvm
- name: Create volume group
  lvg:
   vg: "{{ vg_name }}"
   pvs: "{{ disk }}"

- name: Create logical volume
  lvol:
   vg: "{{ vg_name }}"
   lv: "{{ lv_name }}"
   size: "{{ lv_size }}"

- name: Create filesystem
  filesystem:
   fstype: "{{ filesystem }}"
   dev: "/dev/{{ vg_name }}/{{ lv_name }}"

- name: Create mount directory
  file:
   path: "{{ mount_point }}"
   state: directory

- name: Mount filesystem
  ansible.posix.mount:
   path: "{{ mount_point }}"
   src: "/dev/{{ vg_name }}/{{ lv_name }}"
   fstype: "{{ filesystem }}"
   state: mounted
